<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient - vibrant red -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2442;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e61e3a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle inner glow -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0" />
    </linearGradient>
    
    <!-- Photo gradient -->
    <linearGradient id="photoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#fef2f2;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)" />
  
  <!-- Subtle inner highlight -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88" fill="url(#innerGlow)" />
  
  <!-- Photo frame - tilted slightly for dynamic feel -->
  <g transform="rotate(-8 256 256)">
    <!-- Photo shadow -->
    <rect x="120" y="130" width="280" height="220" rx="16" ry="16" fill="#991b1b" opacity="0.3" />
    
    <!-- Photo base -->
    <rect x="110" y="120" width="280" height="220" rx="16" ry="16" fill="url(#photoGrad)" />
    
    <!-- Photo top bar (like a Polaroid) -->
    <rect x="110" y="120" width="280" height="40" rx="16" ry="16" fill="white" />
    <rect x="110" y="144" width="280" height="16" fill="white" />
    
    <!-- Photo content area - mountain landscape -->
    <rect x="130" y="175" width="240" height="145" rx="8" ry="8" fill="#fecaca" />
    
    <!-- Simple mountain shape -->
    <polygon points="130,320 220,220 310,320" fill="#f87171" opacity="0.6" />
    <polygon points="220,320 320,230 370,320" fill="#ef4444" opacity="0.5" />
    
    <!-- Sun -->
    <circle cx="320" cy="210" r="25" fill="#fbbf24" opacity="0.8" />
    
    <!-- Photo bottom text area -->
    <rect x="130" y="320" width="80" height="8" rx="4" fill="#fca5a5" opacity="0.5" />
    <rect x="220" y="320" width="60" height="8" rx="4" fill="#fca5a5" opacity="0.3" />
  </g>
  
  <!-- Magnifying glass - search symbol -->
  <g transform="translate(310, 290)">
    <!-- Glass shadow -->
    <circle cx="5" cy="5" r="70" fill="#991b1b" opacity="0.2" />
    
    <!-- Glass outer ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="white" stroke-width="18" />
    
    <!-- Glass inner highlight -->
    <circle cx="0" cy="0" r="55" fill="white" opacity="0.15" />
    
    <!-- Glass lens reflection -->
    <path d="M -25 -30 Q -10 -45 5 -30" stroke="white" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round" />
    
    <!-- Handle -->
    <line x1="50" y1="50" x2="100" y2="100" stroke="white" stroke-width="22" stroke-linecap="round" />
    
    <!-- Handle highlight -->
    <line x1="55" y1="45" x2="90" y2="80" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.3" />
  </g>
  
  <!-- Small decorative dots -->
  <circle cx="90" cy="410" r="8" fill="white" opacity="0.2" />
  <circle cx="120" cy="430" r="5" fill="white" opacity="0.15" />
  <circle cx="430" cy="110" r="6" fill="white" opacity="0.2" />
</svg>
