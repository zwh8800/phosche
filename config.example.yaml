watch:
  directories:
    - /path/to/photos
  recursive: true
  debounce_ms: 500
  min_dir_depth: 1
  exclude_dirs: []
  private_dirs: {}
  #   "/Volumes/photo/私人":
  #     - "user@example.com"
  skip_initial_scan: false

llm:
  provider: ollama
  ollama:
    base_url: http://localhost:11434
    model: llama3.2-vision
  openai:
    api_key: ""
    base_url: https://api.openai.com/v1
    model: gpt-4o
  max_retries: 3
  concurrency: 2
  timeout_seconds: 60
  output_language: zh

elasticsearch:
  addresses:
    - http://localhost:9200
  username: ""
  password: ""
  insecure_skip_verify: false
  index_name: phosche

server:
  host: "0.0.0.0"
  port: 8080
  dev_mode: true
  log_level: info
  cache_dir: ""

env:
  amap_key: ""
