watch:
  directories:
    - /path/to/photos
  recursive: true
  debounce_ms: 500
  min_dir_depth: 1

llm:
  provider: ollama
  ollama:
    base_url: http://localhost:11434
    model: llama3.2-vision
  openai:
    api_key: ""
    base_url: https://api.openai.com/v1
    model: gpt-4o
  prompt: |
    分析这张图片，返回 JSON 格式：
    {
      "description": "图片描述（50-100字）",
      "tags": ["标签1", "标签2"],
      "objects": ["物体1", "物体2"],
      "scene_type": "场景类型",
      "colors": ["颜色1", "颜色2"],
      "people_count": 人数,
      "has_text": true/false,
      "text": "图片中的文字内容，无文字则为空字符串"
    }
    
    scene_type 必须是以下之一：
    - indoor: 室内场景
    - outdoor: 室外场景
    - underwater: 水下场景
    - aerial: 航拍/无人机视角
    - studio: 影棚/专业拍摄环境
    - night: 夜景/低光环境
    - unknown: 无法判断
  max_retries: 3
  concurrency: 2
  timeout_seconds: 60
  output_language: zh

elasticsearch:
  addresses:
    - http://localhost:9200
  username: ""
  password: ""
  insecure_skip_verify: false
  index_name: phosche

server:
  host: "0.0.0.0"
  port: 8080
  dev_mode: true
  log_level: info
